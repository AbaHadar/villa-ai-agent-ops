<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Villa AI Concierge — Operations Console</title>
<link rel="stylesheet" href="villa-ai-agent-testing-console.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1>Villa Valentín</h1>
      <h2>AI Concierge Operations Console</h2>
    </div>

    <div class="pill">
      <div class="dot"></div>
      <div class="label">Production Connected · v1.0.0</div>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="grid">

    <!-- LEFT: CONTROLS -->
    <div class="card">
      <div class="card-hd">
        <h3>Controls</h3>
      </div>
      <div class="card-bd">

        <div class="field">
          <label>Endpoint</label>
          <input id="endpoint" class="input"
            value="https://vv-ai-concierge.netlify.app/.netlify/functions/ask">
        </div>

        <div class="field">
          <label>Prompt</label>
          <textarea id="q" class="textarea">
We are considering Villa Valentín for a 40-person wedding weekend. Can you tell me what hosting events there is like?
          </textarea>
        </div>

        <div class="row">
          <button id="runBtn" class="btn primary">Run</button>
          <button id="stopBtn" class="btn ghost">Stop</button>
          <button id="clearBtn" class="btn">Clear</button>
        </div>

        <div id="statusText" class="status">Idle</div>

      </div>
    </div>


    <!-- RIGHT: OUTPUT -->
    <div class="card">

      <div class="card-hd">
        <h3>Guest View</h3>
      </div>

      <div class="card-bd">

        <div class="section">
          <div class="outbox">
            <div id="guestOut" class="out">(waiting...)</div>
          </div>
        </div>

        <div id="ctaContainer" class="section"></div>

        <div class="section">
          <h4>Meta</h4>
          <div id="metaGrid" class="meta"></div>
        </div>

        <div class="outbox">
          <div class="collapsible">
            <div class="title">Raw SSE (Diagnostics)</div>
            <div class="chev">⌄</div>
          </div>
          <div id="rawOut" class="raw collapsed">(no events yet)</div>
        </div>

      </div>
    </div>

  </div>

</div>

<script src="villa-ai-agent-testing-harness.js"></script>
<script src="ops-run-logger.js"></script>
</body>
</html>
