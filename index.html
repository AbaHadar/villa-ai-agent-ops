<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Villa AI Concierge — Operations Console</title>
    <link rel="stylesheet" href="villa-ai-agent-testing-console.css">
</head>

<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-title">Villa Valentín</div>
    <div class="brand-sub">AI Concierge Operations Console</div>
  </div>

  <div class="status-indicator">
    <span class="dot"></span>
    <span>Production Connected</span>
    <span class="version">v1.0.0</span>
  </div>
</header>

<div class="wrap">

  <div class="panel controls">

    <h2>Controls</h2>

    <input id="endpoint" type="text"
      value="https://vv-ai-concierge.netlify.app/.netlify/functions/ask">

    <textarea id="q">
We are considering Villa Valentín for a 40-person wedding weekend. Can you tell me what hosting events there is like?
    </textarea>

    <div class="button-row">
      <button id="runBtn" class="primary">Run</button>
      <button id="stopBtn">Stop</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div id="statusText" class="status">Idle</div>

  </div>

  <div class="panel output">

    <h2>Guest View</h2>
    <div id="guestOut" class="guest">(waiting...)</div>

    <div id="ctaContainer" class="cta-container"></div>

    <h2>Meta</h2>
    <div id="metaGrid" class="meta-grid"></div>

    <h2 class="collapsible">Raw SSE (Diagnostics)</h2>
    <div id="rawOut" class="raw collapsed">(no events yet)</div>

  </div>

</div>

<script src="villa-ai-agent-testing-harness.js"></script>
</body>
</html>
